{{ define "main" }}
<h1>{{ .Title }}</h1>
<p class="album-description">{{ .Content }}</p>

<div class="photo-gallery">
    {{ range .Resources.ByType "image" }}
    <img class="gallery-img lazyload" data-src="{{ .RelPermalink }}" alt="Photo" loading="lazy" draggable="false" oncontextmenu="return false;">
    {{ else }}
    <p>No images found in this album.</p>
    {{ end }}
</div>

<!-- Lightbox Overlay -->
<div id="lightbox" class="lightbox hidden">
    <span class="close-btn" onclick="closeLightbox()">×</span>
    <img id="lightbox-img" src="" alt="Lightbox Image" draggable="false" oncontextmenu="return false;">
    <div class="counter" id="counter"></div>
    <div class="nav-btn prev" onclick="prevImage()">&#10094;</div>
    <div class="nav-btn next" onclick="nextImage()">&#10095;</div>
</div>

<style>
    .lazyload {
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
    }
    .lazyloaded {
        opacity: 1;
    }

    .photo-gallery {
        display: column-count;
        column-count: 4;
        column-gap: 15px;
        margin: 20px auto;
        max-width: 90vw;
    }

    .photo-gallery img {
        width: 100%;
        display: block;
        margin-bottom: 15px;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s ease-in-out;
        user-select: none;
        -webkit-user-drag: none;
    }

    .photo-gallery img:hover {
        transform: scale(1.05);
    }

    .lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.90);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.2s ease-in-out, visibility 0.2s;
        z-index: 9999;
    }

    .lightbox.visible {
        visibility: visible;
        opacity: 1;
    }

    .lightbox img {
        max-width: 85vw;
        max-height: 85vh;
        border-radius: 10px;
    }

    .lightbox .close-btn {
        position: absolute;
        top: 25px;
        right: 40px;
        font-size: 50px;
        color: white;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px;
        border-radius: 50%;
        transition: background 0.2s ease-in-out;
    }

    .lightbox .close-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .lightbox .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 60px;
        color: white;
        cursor: pointer;
        user-select: none;
        padding: 15px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 50%;
        transition: background 0.2s ease-in-out;
    }

    .lightbox .nav-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .lightbox .prev { left: 30px; }
    .lightbox .next { right: 30px; }

    .lightbox .counter {
        position: absolute;
        bottom: 20px;
        color: white;
        font-size: 18px;
        background: rgba(0, 0, 0, 0.6);
        padding: 5px 15px;
        border-radius: 6px;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll(".gallery-img");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const counter = document.getElementById("counter");
        let currentIndex = 0;

        if ("IntersectionObserver" in window) {
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        let img = entry.target;
                        img.src = img.getAttribute("data-src");
                        img.classList.add("lazyloaded");
                        img.removeAttribute("data-src");
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: "50px" });

            images.forEach(img => observer.observe(img));
        } else {
            images.forEach(img => {
                img.src = img.getAttribute("data-src");
                img.classList.add("lazyloaded");
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = images[currentIndex].src;
            counter.textContent = (currentIndex + 1) + " / " + images.length;
            lightbox.classList.add("visible");
        }

        function closeLightbox() {
            lightbox.classList.remove("visible");
        }

        function nextImage() {
            if (currentIndex < images.length - 1) {
                currentIndex++;
                openLightbox(currentIndex);
            }
        }

        function prevImage() {
            if (currentIndex > 0) {
                currentIndex--;
                openLightbox(currentIndex);
            }
        }

        images.forEach((img, index) => {
            img.addEventListener("click", () => openLightbox(index));
        });

        document.querySelector(".close-btn").addEventListener("click", closeLightbox);
        document.querySelector(".next").addEventListener("click", nextImage);
        document.querySelector(".prev").addEventListener("click", prevImage);
        lightbox.addEventListener("click", (e) => {
            if (!e.target.closest(".nav-btn") && e.target !== lightboxImg) {
                closeLightbox();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (lightbox.classList.contains("visible")) {
                if (e.key === "ArrowRight") nextImage();
                if (e.key === "ArrowLeft") prevImage();
                if (e.key === "Escape") closeLightbox();
            }
        });
    });
</script>

{{ end }}
