{{ define "main" }}
<div class="post">
    <h1>{{ .Title }}</h1>
    <div class="album-description">{{ .Content }}</div>
</div>

<div class="photo-gallery">
    {{ range .Resources.ByType "image" }}
    <div class="photo-wrap">
        <img class="gallery-img lazyload" data-src="{{ .RelPermalink }}" alt="Photo" loading="lazy" draggable="false" oncontextmenu="return false;">
    </div>
    {{ else }}
    <p>No images found in this album.</p>
    {{ end }}
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close">&#x2715;</button>
    <button class="lb-nav lb-prev" onclick="prevImage()" aria-label="Previous">&#8249;</button>
    <div class="lb-image-wrap">
        <img id="lightbox-img" src="" alt="Photo" draggable="false" oncontextmenu="return false;">
    </div>
    <button class="lb-nav lb-next" onclick="nextImage()" aria-label="Next">&#8250;</button>
    <div class="lb-counter" id="counter"></div>
</div>

<style>
    /* Gallery */
    .photo-gallery {
        column-count: 3;
        column-gap: 4px;
        margin: 32px auto 60px;
        max-width: 92vw;
    }

    @media (max-width: 900px) {
        .photo-gallery { column-count: 2; }
    }
    @media (max-width: 500px) {
        .photo-gallery { column-count: 1; }
    }

    .photo-wrap {
        break-inside: avoid;
        margin-bottom: 4px;
        overflow: hidden;
        position: relative;
        background: #111;
    }

    .gallery-img {
        width: 100%;
        display: block;
        opacity: 0;
        transition: opacity 0.5s ease,
                    transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                    filter 0.5s ease;
        cursor: pointer;
        user-select: none;
        -webkit-user-drag: none;
        filter: brightness(0.92);
        transform: scale(1.0);
    }

    .gallery-img.lazyloaded {
        opacity: 1;
    }

    .photo-wrap:hover .gallery-img {
        transform: scale(1.03);
        filter: brightness(1.05);
    }

    /* Album description */
    .album-description {
        color: rgba(204,204,204,0.7);
        font-size: 0.92rem;
        line-height: 1.7;
        margin-top: 0.5rem;
        margin-bottom: 2rem;
    }

    /* Lightbox */
    .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(8, 8, 8, 0.97);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.25s ease, visibility 0.25s;
    }

    .lightbox.visible {
        visibility: visible;
        opacity: 1;
    }

    .lb-image-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: 82vw;
        max-height: 88vh;
    }

    #lightbox-img {
        max-width: 82vw;
        max-height: 88vh;
        object-fit: contain;
        display: block;
        box-shadow: 0 0 80px rgba(0,0,0,0.6);
    }

    .lb-close {
        position: absolute;
        top: 24px;
        right: 32px;
        background: none;
        border: none;
        color: rgba(255,255,255,0.45);
        font-size: 20px;
        cursor: pointer;
        padding: 8px;
        line-height: 1;
        transition: color 0.2s ease;
        letter-spacing: 0;
    }

    .lb-close:hover {
        color: rgba(255,255,255,0.9);
    }

    .lb-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: rgba(255,255,255,0.35);
        font-size: 52px;
        font-weight: 200;
        cursor: pointer;
        padding: 16px 20px;
        line-height: 1;
        transition: color 0.2s ease;
        user-select: none;
    }

    .lb-nav:hover {
        color: rgba(255,255,255,0.85);
    }

    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }

    .lb-counter {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.35);
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll(".gallery-img");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const counter = document.getElementById("counter");
        let currentIndex = 0;

        if ("IntersectionObserver" in window) {
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        let img = entry.target;
                        img.src = img.getAttribute("data-src");
                        img.classList.add("lazyloaded");
                        img.removeAttribute("data-src");
                        observer.unobserve(img);
                    }
                });
            }, { rootMargin: "50px" });

            images.forEach(img => observer.observe(img));
        } else {
            images.forEach(img => {
                img.src = img.getAttribute("data-src");
                img.classList.add("lazyloaded");
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = images[currentIndex].src;
            counter.textContent = (currentIndex + 1) + " / " + images.length;
            lightbox.classList.add("visible");
        }

        function closeLightbox() {
            lightbox.classList.remove("visible");
        }

        function nextImage() {
            if (currentIndex < images.length - 1) {
                currentIndex++;
                openLightbox(currentIndex);
            }
        }

        function prevImage() {
            if (currentIndex > 0) {
                currentIndex--;
                openLightbox(currentIndex);
            }
        }

        images.forEach((img, index) => {
            img.addEventListener("click", () => openLightbox(index));
        });

        document.querySelector(".lb-close").addEventListener("click", closeLightbox);
        document.querySelector(".lb-next").addEventListener("click", nextImage);
        document.querySelector(".lb-prev").addEventListener("click", prevImage);
        lightbox.addEventListener("click", (e) => {
            if (!e.target.closest(".lb-nav") && e.target !== lightboxImg) {
                closeLightbox();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (lightbox.classList.contains("visible")) {
                if (e.key === "ArrowRight") nextImage();
                if (e.key === "ArrowLeft") prevImage();
                if (e.key === "Escape") closeLightbox();
            }
        });
    });
</script>

{{ end }}
