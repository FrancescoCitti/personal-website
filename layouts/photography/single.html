{{ define "main" }}
<div class="post">
    <h1>{{ .Title }}</h1>
    <div class="album-description">{{ .Content }}</div>
</div>

<div class="photo-gallery">
    {{ range .Resources.ByType "image" }}
    {{ if ne .Name "cover.jpg" }}
        {{ $thumb := .Resize "700x webp q75" }}
        {{ $full  := .Resize "1600x webp q80" }}
        <div class="photo-wrap">
            <img class="gallery-img lazyload"
                 data-src="{{ $thumb.RelPermalink }}"
                 data-full="{{ $full.RelPermalink }}"
                 alt="Photo"
                 loading="lazy"
                 draggable="false"
                 oncontextmenu="return false;">
        </div>
    {{ end }}
    {{ else }}
    <p>No images found in this album.</p>
    {{ end }}
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close">&#x2715;</button>
    <button class="lb-nav lb-prev" onclick="prevImage()" aria-label="Previous">&#8249;</button>
    <div class="lb-image-wrap">
        <img id="lightbox-img" src="" alt="Photo" draggable="false" oncontextmenu="return false;">
    </div>
    <button class="lb-nav lb-next" onclick="nextImage()" aria-label="Next">&#8250;</button>
    <div class="lb-counter" id="counter"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll(".gallery-img");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const counter = document.getElementById("counter");
        let currentIndex = 0;

        if ("IntersectionObserver" in window) {
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.add("lazyloaded");
                        img.removeAttribute("data-src");
                        obs.unobserve(img);
                    }
                });
            }, { rootMargin: "100px" });
            images.forEach(img => observer.observe(img));
        } else {
            images.forEach(img => {
                img.src = img.dataset.src;
                img.classList.add("lazyloaded");
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = images[currentIndex].dataset.full || images[currentIndex].src;
            counter.textContent = (currentIndex + 1) + " / " + images.length;
            lightbox.classList.add("visible");
        }

        function closeLightbox() {
            lightbox.classList.remove("visible");
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            openLightbox(currentIndex);
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            openLightbox(currentIndex);
        }

        images.forEach((img, index) => {
            img.addEventListener("click", () => openLightbox(index));
        });

        document.querySelector(".lb-close").addEventListener("click", closeLightbox);
        document.querySelector(".lb-next").addEventListener("click", nextImage);
        document.querySelector(".lb-prev").addEventListener("click", prevImage);
        lightbox.addEventListener("click", (e) => {
            if (!e.target.closest(".lb-nav") && e.target !== lightboxImg) {
                closeLightbox();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (lightbox.classList.contains("visible")) {
                if (e.key === "ArrowRight") nextImage();
                if (e.key === "ArrowLeft") prevImage();
                if (e.key === "Escape") closeLightbox();
            }
        });
    });
</script>

{{ end }}
