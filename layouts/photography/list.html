{{ define "main" }}
<div class="post">
    <h1 class="phot-heading">Photography</h1>
</div>

<div class="photography-gallery">
    {{ range sort .Pages "Params.weight"}}
    <a href="{{ .RelPermalink }}" class="gallery-item">
        {{ $cover := .Resources.GetMatch "cover.jpg" }}
        {{ if $cover }}
            {{ $thumb := $cover.Fill "800x534 webp q75" }}
            <img src="{{ $thumb.RelPermalink }}" alt="{{ .Title }}">
        {{ else }}
            <img src="/default-thumbnail.jpg" alt="{{ .Title }}">
        {{ end }}
        <div class="gallery-item-info">
            <span class="gallery-item-title">{{ .Title }}</span>
            {{ with .Date }}<span class="gallery-item-year">{{ .Format "2006" }}</span>{{ end }}
        </div>
    </a>
    {{ end }}
</div>

{{ end }}
